<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Strawberry</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">

  <!-- ── Chrome-style tab strip ───────────────────────────────── -->
  <div class="tab-strip" id="tabStrip">
    <div class="traffic-gap"></div>
    <div class="tabs-list" id="tabsList"></div>
    <button class="tab-add" id="tabAdd" title="New tab">+</button>
  </div>

  <!-- ── Navigation row ───────────────────────────────────────── -->
  <div class="nav-row" id="navRow">
    <button class="nav-btn" id="navBack" disabled>
      <svg width="15" height="15" viewBox="0 0 15 15"><path d="M10 2L5 7.5L10 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    </button>
    <button class="nav-btn" id="navForward" disabled>
      <svg width="15" height="15" viewBox="0 0 15 15"><path d="M5 2L10 7.5L5 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    </button>
    <button class="nav-btn" id="navReload">
      <svg width="15" height="15" viewBox="0 0 15 15"><path d="M13 3A6 6 0 1 0 14 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/><polyline points="10,1 13,3 11,6" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" fill="none"/></svg>
    </button>

    <!-- Session context URL bar -->
    <div class="url-bar-wrap" id="urlBarWrap">
      <svg class="url-bar-icon" width="14" height="14" viewBox="0 0 14 14"><path d="M7 1.5C3.96 1.5 1.5 3.96 1.5 7S3.96 12.5 7 12.5 12.5 10.04 12.5 7 10.04 1.5 7 1.5z" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M1.5 7h11M7 1.5C5.5 4 5 5.5 5 7s.5 3 2 5.5M7 1.5C8.5 4 9 5.5 9 7s-.5 3-2 5.5" stroke="currentColor" stroke-width="1.1" fill="none"/></svg>
      <input id="urlInput" class="url-input" placeholder="Search or enter URL…" autocomplete="off" spellcheck="false"/>
    </div>

    <div class="nav-actions">
      <button class="nav-action-btn outline" id="btnUpdateNow">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 2v7M3 6l3-4 3 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        Update Now
      </button>
      <button class="nav-action-btn solid" id="btnChat">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1h10v7H7l-3 3V8H1z" stroke="white" stroke-width="1.4" fill="none" stroke-linejoin="round"/></svg>
        Chat
      </button>
    </div>
  </div>

  <!-- ── Canvas (sidebar + browser area) ──────────────────────── -->
  <div class="canvas">

    <!-- Left sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sb-logo">
        <svg width="22" height="22" viewBox="0 0 22 22"><rect width="22" height="22" rx="5" fill="#E8430A"/><rect x="5" y="5" width="5" height="5" rx="1" fill="white"/><rect x="12" y="5" width="5" height="5" rx="1" fill="white"/><rect x="5" y="12" width="5" height="5" rx="1" fill="white"/><rect x="12" y="12" width="5" height="5" rx="1" fill="white"/></svg>
      </div>
      <button class="sb-btn" id="sbNew" title="New tab">
        <svg width="15" height="15" viewBox="0 0 15 15"><path d="M7.5 2v11M2 7.5h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <button class="sb-btn" title="Share">
        <svg width="15" height="15" viewBox="0 0 15 15"><path d="M7.5 2v9M4 5l3.5-3L11 5M3 10v3h9v-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </button>
      <button class="sb-btn" id="sbHistory" title="History">
        <svg width="15" height="15" viewBox="0 0 15 15"><circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7.5 4.5V8l2 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="sb-spacer"></div>
      <button class="sb-avatar" id="sbAvatar">GK</button>
    </div>

    <!-- Browser shell — BrowserView is anchored here by main process -->
    <div class="browser-shell" id="browserShell">

      <!-- New-tab page (visible when no URL loaded) -->
      <div class="new-tab-page" id="newTabPage">
        <div class="nt-logo">🍓</div>
        <div class="nt-title">Strawberry</div>
        <div class="nt-search-wrap">
          <input id="ntSearch" class="nt-search" placeholder="Search or enter a URL…" autocomplete="off" spellcheck="false"/>
          <button class="nt-go" id="ntGo">Go</button>
        </div>
        <div class="nt-hint">Press <kbd>Enter</kbd> to search Google, or type a URL</div>
      </div>

      <!-- Find bar — floats top-right when Cmd+F is pressed -->
      <div class="find-bar" id="findBar" hidden>
        <input id="findInput" class="find-input" placeholder="Find in page…" autocomplete="off" spellcheck="false"/>
        <span id="findCount" class="find-count"></span>
        <button id="findPrev"  class="find-nav" title="Previous (Shift+Enter)">↑</button>
        <button id="findNext"  class="find-nav" title="Next (Enter)">↓</button>
        <button id="findClose" class="find-close" title="Close (Escape)">×</button>
      </div>

      <!-- AI chat overlay — floats above the BrowserView -->
      <div class="ai-overlay" id="aiOverlay">

        <!-- Drag handle to resize -->
        <div class="ai-drag-handle" id="aiDragHandle"></div>

        <!-- Thread -->
        <div class="ai-thread" id="aiThread"></div>

        <!-- Input row -->
        <div class="ai-input-row" id="aiInputRow">
          <button class="ai-attach" title="Attach">
            <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 2v10M4 6l4-4 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M3 14h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
          <textarea id="aiInput" class="ai-input" placeholder="Ask Strawberry anything…" rows="1"></textarea>
          <div class="ai-input-meta">
            <span class="smart-tag">★ Smart</span>
            <button class="agent-sel">
              <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="4.5" r="2.5" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M2 12c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>
              <svg width="8" height="8" viewBox="0 0 8 8"><path d="M2 3l2 2 2-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            </button>
            <button class="ai-send" id="aiSend">
              <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 12V4M4 8l4-4 4 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>

        <!-- Session label tab -->
        <div class="session-tab" id="sessionTab">Strawberry</div>

      </div>
    </div>
  </div>

</div>
<script src="renderer.js"></script>
</body>
</html>
