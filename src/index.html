<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <title>Strawberry Browser</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <!-- Title bar + tabs -->
    <div class="titlebar">
      <div class="traffic-light-space"></div>
      <div class="tab-bar" id="tabBar"></div>
      <button class="new-tab-btn" id="newTabBtn" title="New Tab">+</button>
    </div>

    <!-- Navigation bar -->
    <div class="navbar">
      <button class="nav-btn" id="backBtn" title="Back" disabled>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="nav-btn" id="forwardBtn" title="Forward" disabled>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2L10 7L5 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="nav-btn" id="refreshBtn" title="Refresh">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12 2.5A5.5 5.5 0 1 0 13 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="9,1 12,2.5 10.5,5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      </button>
      <div class="url-bar-wrap">
        <svg class="url-icon" width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M6.5 1C6.5 1 4.5 4 4.5 6.5S6.5 12 6.5 12" stroke="currentColor" stroke-width="1.2"/><path d="M1 6.5h11" stroke="currentColor" stroke-width="1.2"/></svg>
        <input class="url-bar" id="urlBar" type="text" placeholder="Search or enter a URL…" autocomplete="off" spellcheck="false" />
      </div>
      <button class="ai-toggle-btn" id="aiToggle">
        <span>🍓</span> AI Companion
      </button>
    </div>

    <!-- Content area -->
    <div class="content-area">
      <div class="webview-container" id="webviewContainer"></div>

      <!-- AI Companion Panel -->
      <div class="ai-panel" id="aiPanel">
        <div class="ai-header">
          <div class="ai-header-left">
            <span class="ai-logo">🍓</span>
            <div>
              <div class="ai-name">Strawberry</div>
              <div class="ai-tagline">AI Browser Companion</div>
            </div>
          </div>
          <button class="icon-btn" id="aiClose" title="Close">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>

        <div class="ai-messages" id="aiMessages">
          <div class="ai-message assistant">
            <div class="message-bubble">
              Hi! I'm Strawberry 🍓 — your AI browser companion.<br><br>
              I can help you <strong>research topics</strong>, <strong>summarize pages</strong>, and <strong>automate tasks</strong> on any website. Just ask!
            </div>
          </div>
        </div>

        <div class="ai-input-area">
          <div class="api-key-warning" id="apiKeyWarning" style="display:none">
            ⚠️ Set <code>ANTHROPIC_API_KEY</code> env var and restart.
          </div>
          <div class="ai-input-row">
            <textarea class="ai-input" id="aiInput" placeholder="Ask Strawberry anything…" rows="2"></textarea>
          </div>
          <div class="ai-actions-row">
            <button class="capture-btn" id="captureBtn" title="Analyze current page">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2" width="11" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/><circle cx="6.5" cy="6" r="1.8" stroke="currentColor" stroke-width="1.3"/></svg>
              Analyze page
            </button>
            <button class="send-btn" id="sendBtn">Send ↑</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
