<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Strawberry</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <!-- Chrome-style tab strip -->
    <div class="tab-strip" id="tabStrip">
      <div class="traffic-gap"></div>
      <div class="tabs-list" id="tabsList"></div>
      <button class="tab-new" id="tabNewBtn" title="New session">+</button>
    </div>

    <div class="workspace">

      <!-- Narrow left sidebar -->
      <div class="sidebar">
        <div class="sb-logo">🍓</div>
        <button class="sb-btn" id="sbNewBtn" title="New session">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="sb-btn" title="Upload">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2M8 2v9M5 5l3-3 3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="sb-btn" title="History">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.6"/><path d="M8 5v3.5l2 1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
        <div class="sb-spacer"></div>
        <button class="sb-btn sb-avatar" id="avatarBtn" title="Account">GK</button>
      </div>

      <!-- Main column -->
      <div class="main-col">

        <!-- Top bar -->
        <div class="topbar">
          <div class="breadcrumb">
            <span class="bc-home">strawberry</span>
            <span class="bc-sep">/</span>
            <span class="bc-title" id="sessionTitle">New session</span>
          </div>
          <div class="topbar-actions">
            <button class="topbar-btn outline">⬆ Update Now</button>
            <button class="topbar-btn solid" id="openChatBtn">💬 Chat</button>
          </div>
        </div>

        <!-- Feed -->
        <div class="feed" id="feed">
          <div class="feed-empty" id="feedEmpty">
            <div class="feed-empty-icon">🍓</div>
            <div class="feed-empty-title">What can I help you with?</div>
            <div class="feed-empty-sub">Research topics, analyze pages, automate tasks — just ask.</div>
          </div>
        </div>

        <!-- Input -->
        <div class="input-area">
          <div class="input-box">
            <button class="input-add" title="Attach">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <textarea id="mainInput" class="main-input" placeholder="Ask Strawberry anything…" rows="1"></textarea>
            <div class="input-right">
              <span class="smart-badge">★ Smart</span>
              <button class="agent-pill" title="Agent mode">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M2 12c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
              </button>
              <button class="send-btn" id="sendBtn" title="Send">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 12V4M4 8l4-4 4 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Profile popup -->
    <div class="profile-popup" id="profilePopup">
      <div class="pp-user">
        <div class="pp-avatar">GK</div>
        <div>
          <div class="pp-name">Gursharan Singh Kohli</div>
          <div class="pp-credits-label">0 credits left</div>
        </div>
      </div>
      <div class="pp-bar-wrap"><div class="pp-bar"></div></div>
      <div class="pp-divider"></div>
      <button class="pp-item">Upgrade plan</button>
      <button class="pp-item">Invite friends for credits</button>
      <button class="pp-item">Settings</button>
      <button class="pp-item">Give feedback</button>
    </div>

  </div>
  <script src="renderer.js"></script>
</body>
</html>
