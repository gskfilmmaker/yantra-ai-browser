<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yantra Server</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { --bg:#111; --surface:#1a1a1a; --surface2:#222; --border:#333; --text:#eee; --text2:#aaa; --text3:#666; --blue:#3b82f6; --red:#ef4444; --green:#22c55e; --r:6px }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; height:100vh; display:flex; flex-direction:column }
  #header { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border); flex-shrink:0 }
  #header h1 { font-size:16px; font-weight:600 }
  #status { font-size:11px; color:var(--text3); margin-left:auto }
  #status.ok { color:var(--green) }
  #browser-bar { display:flex; gap:8px; padding:8px 16px; border-bottom:1px solid var(--border); flex-shrink:0 }
  #current-page { font-size:11px; color:var(--text3); align-self:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1 }
  #main { display:flex; flex:1; overflow:hidden }
  #thread { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px }
  #panel { width:320px; border-left:1px solid var(--border); padding:12px; overflow-y:auto; flex-shrink:0 }
  #panel h3 { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px }
  .msg-user { background:var(--surface2); border-radius:var(--r); padding:10px 14px; font-size:14px; align-self:flex-end; max-width:80% }
  .msg-user.interrupt { border-left:3px solid var(--blue) }
  .msg-ai { font-size:14px; line-height:1.7; white-space:pre-wrap; word-break:break-word }
  .msg-tool { display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--text3); padding:3px 0 }
  .tool-pill { background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:1px 7px; font-size:10.5px }
  .msg-progress { font-size:11px; color:var(--text3) }
  .msg-error { color:var(--red); font-size:13px }
  .dots span { display:inline-block; animation:blink 1.2s infinite; font-size:18px; line-height:1 }
  .dots span:nth-child(2) { animation-delay:.2s } .dots span:nth-child(3) { animation-delay:.4s }
  @keyframes blink { 0%,80%,100%{opacity:.1} 40%{opacity:1} }
  #input-area { padding:12px 16px; border-top:1px solid var(--border); display:flex; gap:8px; flex-shrink:0 }
  #msgInput { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r); color:var(--text); padding:8px 12px; font-size:14px; resize:none; min-height:40px; max-height:120px; font-family:inherit }
  #msgInput:focus { outline:none; border-color:var(--blue) }
  button { cursor:pointer; border:none; border-radius:var(--r); font-family:inherit; font-size:13px; transition:opacity .12s }
  #sendBtn { background:var(--blue); color:#fff; padding:0 16px; height:40px }
  #stopBtn { background:var(--surface2); border:1px solid var(--border); color:var(--text2); padding:0 12px; height:40px; display:none }
  #sendBtn:hover,#stopBtn:hover { opacity:.85 }
  .session-item { padding:8px; border-radius:var(--r); font-size:11.5px; cursor:pointer; margin-bottom:4px }
  .session-item:hover { background:var(--surface2) }
  .session-goal { color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .session-time { font-size:10px; color:var(--text3); margin-top:2px }
  .session-item.incomplete .session-goal::before { content:'⏸ '; color:var(--blue) }
</style>
</head>
<body>
<div id="header">
  <h1>⟁ Yantra</h1>
  <div id="status">Connecting…</div>
</div>
<div id="browser-bar">
  <span id="current-page">No page loaded</span>
</div>
<div id="main">
  <div id="thread"></div>
  <div id="panel">
    <h3>Recent Sessions</h3>
    <div id="sessionList"></div>
  </div>
</div>
<div id="input-area">
  <textarea id="msgInput" placeholder="Ask Yantra anything… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
  <button id="sendBtn">Send</button>
  <button id="stopBtn">Stop</button>
</div>

<script>
const BASE = ''
let sessionId = null
let isRunning = false
let es = null

// ── Health check ──────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(BASE + '/api/health')
    const d = await r.json()
    const el = document.getElementById('status')
    el.textContent = 'Connected · ' + d.sessions + ' sessions'
    el.className = 'ok'
  } catch { document.getElementById('status').textContent = 'Offline' }
}
setInterval(checkHealth, 5000); checkHealth()

// ── Browser state polling ─────────────────────────────────────────────────────
setInterval(async () => {
  if (!sessionId) return
  try {
    const r = await fetch(BASE + '/api/browser/state?sessionId=' + sessionId)
    const d = await r.json()
    document.getElementById('current-page').textContent = d.title ? d.title + ' — ' + d.url : (d.url || 'No page loaded')
  } catch {}
}, 2000)

// ── Sessions list ─────────────────────────────────────────────────────────────
async function loadSessions() {
  try {
    const r = await fetch(BASE + '/api/sessions')
    const sessions = await r.json()
    const list = document.getElementById('sessionList')
    list.innerHTML = ''
    sessions.forEach(s => {
      const el = document.createElement('div')
      el.className = 'session-item' + (s.completed_at ? '' : ' incomplete')
      const ago = s.started_at ? Math.round((Date.now() - s.started_at) / 60000) : 0
      el.innerHTML = `<div class="session-goal">${esc(s.goal || s.id)}</div><div class="session-time">${ago < 60 ? ago + 'm ago' : Math.round(ago/60) + 'h ago'}</div>`
      el.addEventListener('click', () => {
        sessionId = s.id
        connectSSE()
        appendMessage('system', `Resumed session: ${s.goal}`)
      })
      list.appendChild(el)
    })
  } catch {}
}
setInterval(loadSessions, 15000); loadSessions()

// ── SSE connection ────────────────────────────────────────────────────────────
function connectSSE() {
  if (es) es.close()
  es = new EventSource(BASE + '/api/agent/stream/' + sessionId)
  es.onmessage = e => handleEvent(JSON.parse(e.data))
}

let currentAiEl = null
function handleEvent(ev) {
  switch (ev.type) {
    case 'progress':
      if (!currentAiEl) { currentAiEl = appendMessage('thinking', ''); }
      currentAiEl.innerHTML = `<span class="dots"><span>·</span><span>·</span><span>·</span></span> Step ${ev.turn}/${ev.maxTurns} · ${fmtElapsed(ev.elapsed || 0)}`
      break
    case 'tool_call':
      appendMessage('tool', ev.toolName + (ev.toolInput?.url ? ': ' + ev.toolInput.url.slice(0,60) : ev.toolInput?.query ? ': "' + ev.toolInput.query.slice(0,50) + '"' : ''))
      break
    case 'text':
      if (currentAiEl && currentAiEl.dataset.type === 'thinking') { currentAiEl.remove(); currentAiEl = null }
      if (!currentAiEl || currentAiEl.dataset.type !== 'ai') { currentAiEl = appendMessage('ai', '') }
      currentAiEl.textContent = ev.text
      scrollBottom()
      break
    case 'error':
      appendMessage('error', ev.text)
      finishRun(); break
    case 'done':
      currentAiEl = null
      finishRun()
      loadSessions()
      break
  }
}

function appendMessage(type, text) {
  const thread = document.getElementById('thread')
  const el = document.createElement('div')
  el.dataset.type = type
  el.textContent = text
  el.className = type === 'user' ? 'msg-user' : type === 'ai' ? 'msg-ai' : type === 'tool' ? 'msg-tool' : type === 'thinking' ? 'msg-progress' : type === 'error' ? 'msg-error' : ''
  if (type === 'tool') { const pill = document.createElement('span'); pill.className = 'tool-pill'; pill.textContent = '⚙'; el.prepend(pill) }
  thread.appendChild(el); scrollBottom()
  return el
}

function scrollBottom() { const t = document.getElementById('thread'); t.scrollTop = t.scrollHeight }

function finishRun() {
  isRunning = false
  document.getElementById('sendBtn').style.display = ''
  document.getElementById('stopBtn').style.display = 'none'
  document.getElementById('msgInput').placeholder = 'Ask Yantra anything…'
}

function fmtElapsed(s) { return s < 60 ? s + 's' : Math.floor(s/60) + 'm ' + (s%60) + 's' }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;') }

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msgInput')
  const text = input.value.trim()
  if (!text) return
  input.value = ''; input.style.height = 'auto'

  if (isRunning && sessionId) {
    appendMessage('user interrupt', text)
    await fetch(BASE + '/api/agent/interrupt/' + sessionId, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: text }) })
    return
  }

  appendMessage('user', text)
  const r = await fetch(BASE + '/api/agent/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: text, sessionId }) })
  const d = await r.json()
  sessionId = d.sessionId
  connectSSE()
  isRunning = true
  document.getElementById('sendBtn').style.display = 'none'
  document.getElementById('stopBtn').style.display = ''
  document.getElementById('msgInput').placeholder = 'Agent is working — type here to send a correction…'
}

document.getElementById('sendBtn').addEventListener('click', sendMessage)
document.getElementById('msgInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() } })
document.getElementById('msgInput').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px' })
document.getElementById('stopBtn').addEventListener('click', async () => {
  if (!sessionId) return
  await fetch(BASE + '/api/agent/cancel/' + sessionId, { method: 'POST' })
})
</script>
</body>
</html>
